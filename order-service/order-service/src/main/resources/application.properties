spring.application.name=${SPRING_APPLICATION_NAME:order-service}

# Redis
spring.data.redis.host=${SPRING_DATA_REDIS_HOST:localhost}
spring.data.redis.port=${SPRING_DATA_REDIS_PORT:6379}

# Rate Limiting
# Max requests allowed per IP within the time window
rate.limit.max-requests=${RATE_LIMIT_MAX_REQUESTS:10}
# Time window in seconds (10 requests per 60 seconds per IP)
rate.limit.window-seconds=${RATE_LIMIT_WINDOW_SECONDS:60}

# -----------------------------------------------------------------------
# Actuator & Metrics (Micrometer + Prometheus)
# -----------------------------------------------------------------------
# Expose the prometheus scrape endpoint and health check
management.endpoints.web.exposure.include=prometheus,health,metrics
management.endpoint.health.show-details=always

# Tag every metric with the service name.
# In Prometheus/Grafana you can then filter: {application="order-service"}
management.metrics.tags.application=${spring.application.name}

# HTTP server request metrics — tracks latency and count per endpoint
management.metrics.enable.http=true
