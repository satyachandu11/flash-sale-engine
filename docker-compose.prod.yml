# Production Docker Compose
# Uses pre-built images from GHCR pushed by the CI/CD pipeline.
# Run on Oracle Cloud VM: docker compose -f docker-compose.prod.yml up -d

services:

  # ─── Infrastructure ────────────────────────────────────────────────────────

  postgres:
    image: postgres:15
    container_name: flashsale-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-flashsale}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - flashsale-net
    # NOT exposed publicly — only accessible within Docker network

  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    container_name: flashsale-zookeeper
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      KAFKA_HEAP_OPTS: "-Xmx256m -Xms128m"
    mem_limit: 384m
    networks:
      - flashsale-net

  kafka:
    image: confluentinc/cp-kafka:7.4.0
    container_name: flashsale-kafka
    restart: unless-stopped
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,PLAINTEXT_INTERNAL://0.0.0.0:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_INTERNAL://kafka:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT_INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_LOG_RETENTION_HOURS: 48
      KAFKA_HEAP_OPTS: "-Xmx512m -Xms256m"
    mem_limit: 768m
    networks:
      - flashsale-net

  redis:
    image: redis:7-alpine
    container_name: flashsale-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD}
    networks:
      - flashsale-net

  # ─── Application Services ──────────────────────────────────────────────────

  order-service:
    image: ghcr.io/${GITHUB_REPO_OWNER}/flash-sale-engine/order-service:${IMAGE_TAG:-latest}
    container_name: flashsale-order
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-flashsale}?TimeZone=UTC
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_DATA_REDIS_PASSWORD: ${REDIS_PASSWORD}
      APP_CORS_ALLOWED_ORIGIN: ${FRONTEND_URL}
      APP_PUBLIC_UI_ORIGIN: ${FRONTEND_URL}
      APP_ADMIN_UI_ORIGIN: ${ADMIN_FRONTEND_URL}
      RATE_LIMIT_MAX_REQUESTS: ${RATE_LIMIT_MAX_REQUESTS:-10}
      RATE_LIMIT_WINDOW_SECONDS: ${RATE_LIMIT_WINDOW_SECONDS:-60}
      JAVA_OPTS: "-Xmx256m -Xms128m"
    mem_limit: 384m
    depends_on:
      - postgres
      - kafka
      - redis
    networks:
      - flashsale-net

  inventory-service:
    image: ghcr.io/${GITHUB_REPO_OWNER}/flash-sale-engine/inventory-service:${IMAGE_TAG:-latest}
    container_name: flashsale-inventory
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-flashsale}?TimeZone=UTC
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_DATA_REDIS_PASSWORD: ${REDIS_PASSWORD}
      APP_CORS_ALLOWED_ORIGIN: ${FRONTEND_URL}
      ADMIN_SERVICE_INTERNAL_SECRET: ${ADMIN_SERVICE_INTERNAL_SECRET}
      JAVA_OPTS: "-Xmx256m -Xms128m"
    mem_limit: 384m
    depends_on:
      - postgres
      - kafka
      - redis
    networks:
      - flashsale-net

  payment-service:
    image: ghcr.io/${GITHUB_REPO_OWNER}/flash-sale-engine/payment-service:${IMAGE_TAG:-latest}
    container_name: flashsale-payment
    restart: unless-stopped
    ports:
      - "8082:8082"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-flashsale}?TimeZone=UTC
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      APP_CORS_ALLOWED_ORIGIN: ${FRONTEND_URL}
      PAYMENT_GATEWAY_FAILURE_RATE: ${PAYMENT_GATEWAY_FAILURE_RATE:-0.2}
      JAVA_OPTS: "-Xmx256m -Xms128m"
    mem_limit: 384m
    depends_on:
      - postgres
      - kafka
    networks:
      - flashsale-net

  admin-service:
    image: ghcr.io/${GITHUB_REPO_OWNER}/flash-sale-engine/admin-service:${IMAGE_TAG:-latest}
    container_name: flashsale-admin
    restart: unless-stopped
    ports:
      - "8083:8083"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-flashsale}?TimeZone=UTC
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_DATA_REDIS_PASSWORD: ${REDIS_PASSWORD}
      ADMIN_USERNAME: ${ADMIN_USERNAME}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      ADMIN_SESSION_TTL_SECONDS: ${ADMIN_SESSION_TTL_SECONDS:-28800}
      PUBLIC_ACCESS_SESSION_TTL_SECONDS: ${PUBLIC_ACCESS_SESSION_TTL_SECONDS:-86400}
      INVITE_TTL_HOURS: ${INVITE_TTL_HOURS:-24}
      ADMIN_SERVICE_INTERNAL_SECRET: ${ADMIN_SERVICE_INTERNAL_SECRET}
      INVENTORY_SERVICE_BASE_URL: http://inventory-service:8081
      ADMIN_NOTIFICATION_EMAIL: ${ADMIN_NOTIFICATION_EMAIL}
      RESEND_API_KEY: ${RESEND_API_KEY}
      RESEND_FROM_EMAIL: ${RESEND_FROM_EMAIL}
      ADMIN_MANAGED_PRODUCT_ID: ${ADMIN_MANAGED_PRODUCT_ID}
      ADMIN_MANAGED_PRODUCT_NAME: ${ADMIN_MANAGED_PRODUCT_NAME}
      ADMIN_MANAGED_PRODUCT_DESCRIPTION: ${ADMIN_MANAGED_PRODUCT_DESCRIPTION}
      ADMIN_MANAGED_PRODUCT_TOP_UP: ${ADMIN_MANAGED_PRODUCT_TOP_UP:-100}
      APP_CORS_ALLOWED_ORIGIN: ${FRONTEND_URL}
      APP_PUBLIC_UI_ORIGIN: ${FRONTEND_URL}
      APP_ADMIN_UI_ORIGIN: ${ADMIN_FRONTEND_URL}
      JAVA_OPTS: "-Xmx256m -Xms128m"
    mem_limit: 384m
    depends_on:
      - postgres
      - redis
    networks:
      - flashsale-net

  # ─── Frontends ─────────────────────────────────────────────────────────────

  frontend:
    image: ghcr.io/${GITHUB_REPO_OWNER}/flash-sale-engine/frontend:${IMAGE_TAG:-latest}
    container_name: flashsale-frontend
    restart: unless-stopped
    ports:
      - "3001:80"
    networks:
      - flashsale-net

  admin-frontend:
    image: ghcr.io/${GITHUB_REPO_OWNER}/flash-sale-engine/admin-frontend:${IMAGE_TAG:-latest}
    container_name: flashsale-admin-frontend
    restart: unless-stopped
    ports:
      - "3002:80"
    networks:
      - flashsale-net

  # ─── Monitoring ────────────────────────────────────────────────────────────

  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: flashsale-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.prod.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=15d'
    networks:
      - flashsale-net

  grafana:
    image: grafana/grafana:10.4.2
    container_name: flashsale-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: false
      GF_SERVER_ROOT_URL: ${GRAFANA_URL}
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - flashsale-net

  # ─── Nginx Reverse Proxy (handles all public traffic + SSL termination) ────

  nginx:
    image: nginx:1.27-alpine
    container_name: flashsale-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.prod.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /var/www/certbot:/var/www/certbot:ro
    depends_on:
      - order-service
      - inventory-service
      - payment-service
      - admin-service
      - frontend
      - admin-frontend
      - grafana
    networks:
      - flashsale-net

volumes:
  postgres_data:
  prometheus_data:
  grafana_data:

networks:
  flashsale-net:
    driver: bridge
