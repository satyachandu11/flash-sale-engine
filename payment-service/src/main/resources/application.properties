spring.application.name=${SPRING_APPLICATION_NAME:payment-service}
server.port=${SERVER_PORT:8082}
app.cors.allowed-origin=${APP_CORS_ALLOWED_ORIGIN:http://localhost:5173}

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/flashsale?TimeZone=UTC}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:admin}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:admin}
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:true}
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.properties.hibernate.dialect=${SPRING_JPA_HIBERNATE_DIALECT:org.hibernate.dialect.PostgreSQLDialect}

spring.kafka.bootstrap-servers=${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.producer.properties.spring.json.add.type.headers=false

# -----------------------------------------------------------------------
# Payment Gateway Simulation
# -----------------------------------------------------------------------
# Controls what percentage of payments "fail" at the gateway (0.0 to 1.0).
# 0.2 = 20% failure rate (default — mostly succeeds)
# 0.7 = 70% failure rate (will trip the circuit breaker quickly for demo)
# 0.0 = always succeed
# 1.0 = always fail
#
# Your frontend simulation can let the user set this before starting the demo.
# Higher failure rate → circuit breaker opens faster → visible in demo.
payment.gateway.failure-rate=${PAYMENT_GATEWAY_FAILURE_RATE:0.2}

# -----------------------------------------------------------------------
# Circuit Breaker Configuration (Resilience4j)
# -----------------------------------------------------------------------
# Circuit breaker instance name must match @CircuitBreaker(name = "paymentGateway")

# SLIDING WINDOW: tracks the last N calls to calculate failure rate.
# COUNT_BASED means "last 20 calls" (vs TIME_BASED = "calls in last N seconds").
resilience4j.circuitbreaker.instances.paymentGateway.sliding-window-type=COUNT_BASED
resilience4j.circuitbreaker.instances.paymentGateway.sliding-window-size=20

# FAILURE RATE THRESHOLD: if >= 50% of the last 20 calls fail, circuit OPENS.
# e.g. 10 failures out of 20 calls → circuit trips open.
# With 20% random failure rate: expected ~4 failures in 20 calls (20%) — well below threshold.
# With 75% failure rate (payment-failures preset): expected ~15 failures — CB trips quickly.
resilience4j.circuitbreaker.instances.paymentGateway.failure-rate-threshold=50

# MINIMUM CALLS: don't evaluate failure rate until at least 20 calls have been made.
# With minimum=5, there was a ~5.8% chance of tripping after just 3 failures out of 5
# concurrent calls — causing 100+ orders to fast-fail before any real load was measured.
# Setting to 20 ensures the CB has a representative sample before tripping.
resilience4j.circuitbreaker.instances.paymentGateway.minimum-number-of-calls=20

# WAIT IN OPEN STATE: circuit stays open for 5 seconds.
# Faster recovery for demo scenarios — gateway can recover sooner.
resilience4j.circuitbreaker.instances.paymentGateway.wait-duration-in-open-state=5s

# HALF-OPEN: after 5s, circuit moves to HALF-OPEN state.
# Allow 5 test calls through to probe if the gateway has recovered.
resilience4j.circuitbreaker.instances.paymentGateway.permitted-number-of-calls-in-half-open-state=5

# Automatically transition from OPEN → HALF-OPEN after wait duration.
# Without this, the transition is manual (must be triggered externally).
resilience4j.circuitbreaker.instances.paymentGateway.automatic-transition-from-open-to-half-open-enabled=true

# Expose circuit breaker metrics via Spring Actuator (/actuator/health, /actuator/metrics)
resilience4j.circuitbreaker.instances.paymentGateway.register-health-indicator=true

# -----------------------------------------------------------------------
# Actuator & Metrics (Micrometer + Prometheus)
# -----------------------------------------------------------------------
management.endpoints.web.exposure.include=prometheus,health,metrics
management.endpoints.web.cors.allowed-origins=${app.cors.allowed-origin}
management.endpoints.web.cors.allowed-methods=GET,POST,OPTIONS
management.endpoints.web.cors.allowed-headers=*
management.endpoint.health.show-details=always
management.metrics.tags.application=${spring.application.name}

# Resilience4j exports circuit breaker metrics to Micrometer automatically.
# Key metrics visible in Grafana:
#   resilience4j_circuitbreaker_state          — current state (closed/open/half_open)
#   resilience4j_circuitbreaker_calls_total    — call counts by kind (successful/failed/not_permitted)
#   resilience4j_circuitbreaker_failure_rate   — rolling failure %
