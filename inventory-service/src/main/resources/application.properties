spring.application.name=${SPRING_APPLICATION_NAME:inventory-service}
server.port=${SERVER_PORT:8081}
app.cors.allowed-origin=${APP_CORS_ALLOWED_ORIGIN:http://localhost:5173}
inventory.internal-service-secret=${ADMIN_SERVICE_INTERNAL_SECRET:change-me}

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/flashsale?TimeZone=UTC}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:admin}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:admin}
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:true}
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.properties.hibernate.dialect=${SPRING_JPA_HIBERNATE_DIALECT:org.hibernate.dialect.PostgreSQLDialect}

spring.kafka.bootstrap-servers=${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.producer.properties.spring.json.add.type.headers=false

outbox.publish.fixed-delay-ms=${OUTBOX_PUBLISH_FIXED_DELAY_MS:2000}

# Redis
spring.data.redis.host=${SPRING_DATA_REDIS_HOST:localhost}
spring.data.redis.port=${SPRING_DATA_REDIS_PORT:6379}

# Cache
inventory.cache.ttl-seconds=${INVENTORY_CACHE_TTL_SECONDS:30}

# -----------------------------------------------------------------------
# Actuator & Metrics (Micrometer + Prometheus)
# -----------------------------------------------------------------------
management.endpoints.web.exposure.include=prometheus,health,metrics
management.endpoints.web.cors.allowed-origins=${app.cors.allowed-origin}
management.endpoints.web.cors.allowed-methods=GET,POST,OPTIONS
management.endpoints.web.cors.allowed-headers=*
management.endpoint.health.show-details=always
management.metrics.tags.application=${spring.application.name}

# Cache metrics — tracks hit/miss counts for the "inventory" cache
# Visible in Grafana as: cache_gets_total{name="inventory", result="hit/miss"}
management.metrics.enable.cache=true
