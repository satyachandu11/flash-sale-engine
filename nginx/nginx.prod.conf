events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    # ── Redirect HTTP → HTTPS ──────────────────────────────────────────────
    server {
        listen 80;
        server_name _;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ── Public Frontend — fsengine.dev + www.fsengine.dev ──────────────
    server {
        listen 443 ssl;
        server_name fsengine.dev www.fsengine.dev;

        ssl_certificate     /etc/letsencrypt/live/fsengine.dev/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/fsengine.dev/privkey.pem;

        location / {
            proxy_pass http://frontend:80;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Public invite endpoints (served by admin-service)
        location /public/ {
            proxy_pass http://admin-service:8083;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }

    # ── Admin Frontend — admin.fsengine.dev ──────────────────────────────
    server {
        listen 443 ssl;
        server_name admin.fsengine.dev;

        ssl_certificate     /etc/letsencrypt/live/admin.fsengine.dev/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/admin.fsengine.dev/privkey.pem;

        location / {
            proxy_pass http://admin-frontend:80;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Admin API calls — strip /admin-api prefix before forwarding
        location /admin-api/ {
            rewrite ^/admin-api/(.*) /$1 break;
            proxy_pass http://admin-service:8083;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }

    # ── Order Service API — order.fsengine.dev ───────────────────────────
    server {
        listen 443 ssl;
        server_name order.fsengine.dev;

        ssl_certificate     /etc/letsencrypt/live/order.fsengine.dev/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/order.fsengine.dev/privkey.pem;

        location / {
            proxy_pass http://order-service:8080;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            # SSE support
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 600s;
            proxy_set_header Connection '';
            proxy_http_version 1.1;
        }
    }

    # ── Inventory Service API — inventory.fsengine.dev ───────────────────
    server {
        listen 443 ssl;
        server_name inventory.fsengine.dev;

        ssl_certificate     /etc/letsencrypt/live/inventory.fsengine.dev/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/inventory.fsengine.dev/privkey.pem;

        location / {
            proxy_pass http://inventory-service:8081;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }

    # ── Payment Service API — payment.fsengine.dev ───────────────────────
    server {
        listen 443 ssl;
        server_name payment.fsengine.dev;

        ssl_certificate     /etc/letsencrypt/live/payment.fsengine.dev/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/payment.fsengine.dev/privkey.pem;

        location / {
            proxy_pass http://payment-service:8082;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }

    # ── Grafana — grafana.fsengine.dev ───────────────────────────────────
    server {
        listen 443 ssl;
        server_name grafana.fsengine.dev;

        ssl_certificate     /etc/letsencrypt/live/grafana.fsengine.dev/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/grafana.fsengine.dev/privkey.pem;

        location / {
            proxy_pass http://grafana:3000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}
