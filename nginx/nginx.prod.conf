# Production Nginx config
# Replace YOUR_DOMAIN with your actual domain (e.g., flashsale.yourdomain.in)

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Logging
    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    # ── Redirect HTTP → HTTPS ──────────────────────────────────────────────
    server {
        listen 80;
        server_name _;

        # Let's Encrypt ACME challenge (needed for cert renewal)
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ── Public Frontend  (https://flashsale.YOUR_DOMAIN) ──────────────────
    server {
        listen 443 ssl;
        server_name flashsale.YOUR_DOMAIN;

        ssl_certificate     /etc/letsencrypt/live/flashsale.YOUR_DOMAIN/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/flashsale.YOUR_DOMAIN/privkey.pem;

        # Serve the React frontend
        location / {
            proxy_pass http://frontend:80;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # API calls from public frontend → order-service
        location /api/orders {
            proxy_pass http://order-service:8080;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            # SSE requires buffering disabled
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 300s;
        }

        # SSE endpoint for real-time order status
        location /api/orders/status-stream {
            proxy_pass http://order-service:8080;
            proxy_set_header Host $host;
            proxy_set_header Connection '';
            proxy_http_version 1.1;
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 600s;
        }

        # Public invite endpoints
        location /public/ {
            proxy_pass http://admin-service:8083;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }

    # ── Admin Frontend  (https://admin.YOUR_DOMAIN) ───────────────────────
    server {
        listen 443 ssl;
        server_name admin.YOUR_DOMAIN;

        ssl_certificate     /etc/letsencrypt/live/admin.YOUR_DOMAIN/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/admin.YOUR_DOMAIN/privkey.pem;

        # Serve the admin React frontend
        location / {
            proxy_pass http://admin-frontend:80;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Admin API calls → admin-service
        location /admin/ {
            proxy_pass http://admin-service:8083;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }

    # ── Grafana Monitoring  (https://grafana.YOUR_DOMAIN) ─────────────────
    # Password protect this — only for your portfolio demos
    server {
        listen 443 ssl;
        server_name grafana.YOUR_DOMAIN;

        ssl_certificate     /etc/letsencrypt/live/grafana.YOUR_DOMAIN/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/grafana.YOUR_DOMAIN/privkey.pem;

        location / {
            proxy_pass http://grafana:3000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}
