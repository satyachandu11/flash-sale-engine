global:
  scrape_interval: 5s       # Pull metrics from every service every 5 seconds
  evaluation_interval: 5s   # Evaluate alerting rules every 5 seconds

scrape_configs:

  # -----------------------------------------------------------------------
  # Order Service — HTTP metrics, JVM, rate limit counters
  # -----------------------------------------------------------------------
  - job_name: 'order-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['host.docker.internal:8080']
        labels:
          application: 'order-service'

  # -----------------------------------------------------------------------
  # Inventory Service — Cache hit/miss, JVM, Kafka consumer metrics
  # -----------------------------------------------------------------------
  - job_name: 'inventory-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['host.docker.internal:8081']
        labels:
          application: 'inventory-service'

  # -----------------------------------------------------------------------
  # Payment Service — Circuit breaker state, failure rate, JVM metrics
  # -----------------------------------------------------------------------
  - job_name: 'payment-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['host.docker.internal:8082']
        labels:
          application: 'payment-service'

# NOTE: host.docker.internal resolves to your host machine's IP from inside Docker.
# This is how Prometheus (running in Docker) reaches the Spring Boot services
# (running on localhost). Works automatically on Windows and Mac with Docker Desktop.
# On Linux: add --add-host=host.docker.internal:host-gateway to the Prometheus container.
